# Optional: refresh committed EOD snapshot for Vercel/CI (no DATABASE_URL required).
# PSE EDGE must be reachable from GitHub runners; use workflow_dispatch if scheduled runs fail.

name: Market snapshot

on:
  schedule:
    - cron: "0 11 * * 1-5"
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run setup:market-data
      - run: npm run validate:data
      - name: Check for snapshot changes
        id: diff
        run: |
          git diff --quiet data/market-quotes-snapshot.json && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"
      - name: Commit snapshot
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/market-quotes-snapshot.json
          git commit -m "chore: refresh market quotes snapshot"
          git push
